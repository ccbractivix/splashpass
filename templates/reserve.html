{% extends "base.html" %}
{% block title %}Make a Reservation{% endblock %}
{% block content %}
<h1>Make a Reservation</h1>
<form method="POST" action="{{ url_for('reserve') }}" id="reserveForm">
    <div class="form-group">
        <label for="owner_number">Owner Number</label>
        <input type="text" id="owner_number" name="owner_number" required
               placeholder="Enter your owner number">
    </div>
    <div class="form-group">
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" required
               placeholder="Enter your last name">
    </div>
    <div class="form-group">
        <label for="reservation_date">Reservation Date</label>
        <input type="date" id="reservation_date" name="reservation_date" required>
    </div>
    <div class="form-group">
        <label for="party_size">Party Size (including yourself, max 6)</label>
        <select id="party_size" name="party_size" required>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Reserve</button>
</form>

<script>
    // Set min date to today
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const minDate = `${yyyy}-${mm}-${dd}`;
    document.getElementById('reservation_date').setAttribute('min', minDate);
    // Set max date to 6 days from now
    const maxD = new Date();
    maxD.setDate(maxD.getDate() + 6);
    const maxYyyy = maxD.getFullYear();
    const maxMm = String(maxD.getMonth() + 1).padStart(2, '0');
    const maxDd = String(maxD.getDate()).padStart(2, '0');
    document.getElementById('reservation_date').setAttribute('max', `${maxYyyy}-${maxMm}-${maxDd}`);
</script>
{% endblock %}
