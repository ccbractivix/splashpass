{% extends "base.html" %}
{% block title %}Lookup - SplashPass{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="text-center mb-4">🔍 Reservation Lookup</h2>
            <form method="POST" action="{{ url_for('lookup') }}">
                <div class="mb-3">
                    <label class="form-label fw-bold">Confirmation Code</label>
                    <input type="text" name="confirmation" class="form-control"
                           placeholder="e.g. SPAB1234" required style="text-transform: uppercase;">
                </div>
                <button type="submit" class="btn btn-splash w-100">Look Up</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
