{% extends "base.html" %}
{% block title %}Calendar Editor{% endblock %}
{% block content %}
<h2>Calendar Editor</h2>

<form method="GET" class="mb-3">
  <label>Month:
    <select name="month" onchange="this.form.submit()">
      {% for m in range(1,13) %}
      <option value="{{ m }}" {% if m == month %}selected{% endif %}>
        {{ datetime(2025, m, 1).strftime('%B') }}
      </option>
      {% endfor %}
    </select>
  </label>
  <label class="ms-2">Year:
    <select name="year" onchange="this.form.submit()">
      {% for y in range(2025, 2028) %}
      <option value="{{ y }}" {% if y == year %}selected{% endif %}>{{ y }}</option>
      {% endfor %}
    </select>
  </label>
</form>

<form method="POST" action="/admin/calendar/bulk">
  <input type="hidden" name="month" value="{{ month }}">
  <input type="hidden" name="year" value="{{ year }}">

  <table class="table table-bordered text-center" style="max-width:900px;">
    <thead>
      <tr>
        <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
      </tr>
    </thead>
    <tbody>
      {% for week in weeks %}
      <tr>
        {% for day in week %}
        <td style="vertical-align:top; padding:6px; min-width:110px; {% if day and day.date == today %}background:#fff3cd;{% endif %}">
          {% if day %}
            <strong>{{ day.date.day }}</strong><br>
            <select name="type_{{ day.date.isoformat() }}" class="form-select form-select-sm mt-1">
              <option value="Weekday" {% if day.day_type == 'Weekday' %}selected{% endif %}>Weekday</option>
              <option value="Weekend" {% if day.day_type == 'Weekend' %}selected{% endif %}>Weekend</option>
              <option value="High Use" {% if day.day_type == 'High Use' %}selected{% endif %}>High Use</option>
            </select>
            <input type="number" name="cap_{{ day.date.isoformat() }}" 
                   value="{{ day.capacity }}" 
                   class="form-control form-control-sm mt-1" 
                   min="0" max="500" style="width:80px; margin:auto;">
          {% endif %}
        </td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <button type="submit" class="btn btn-primary btn-lg mt-2">💾 Save All Changes for {{ datetime(2025, month, 1).strftime('%B') }} {{ year }}</button>
</form>

<a href="/admin/dashboard" class="btn btn-secondary mt-3">← Back to Dashboard</a>
{% endblock %}
